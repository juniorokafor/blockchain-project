<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Include the Web3 library -->
    <script src="https://cdn.jsdelivr.net/gh/ethereum/web3.js/dist/web3.min.js"></script>
    <!-- Include the jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- Shared config: CONTRACT_ADDRESS, ABI, web3, contract -->
    <script src="../js/config.js"></script>
    <!-- Include your CSS file -->
    <link rel="stylesheet" href="./checkBalance.css">
    <title>Check Balance</title>
</head>
<body>
    <p><a href="../index.html">&larr; Home</a></p>

    <h1>Check Balance</h1>
    <p>Look up the SETH (Sepolia ETH) and ticket token (TIX) balance for any wallet. Used by attendees to confirm purchases, doormen to validate tickets, and the venue to view ticket distribution.</p>

    <label for="walletAddress">Enter the wallet address to check:</label>
    <input type="text" id="walletAddress" name="walletAddress" size="50">
    <br/>
    <br/>

    <button id="cryptoBalanceButton">Check SETH Balance</button>
    <button id="tokenBalanceButton">Check Ticket (TIX) Balance</button>
    <br/>
    <br/>

    <label id="cryptoBalance"><strong>SETH Balance:</strong></label>
    <br/>
    <label id="tokenBalance"><strong>Ticket Balance:</strong></label>
    <br/>
    <label id="tokenName"><strong>Token Name:</strong></label>
    <br/>
    <label id="tokenSymbol"><strong>Token Symbol:</strong></label>
    <br/>
    <label id="tokenTotalSupply"><strong>Total Tickets Issued:</strong></label>
    <br/>
    <label id="ticketsAvailable"><strong>Tickets Available:</strong></label>
    <br/>

    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <p id="errorMessage"></p>
        </div>
    </div>
</body>

<script>
    // Check the native SETH balance
    $("#cryptoBalanceButton").click(function() {
        const walletAddress = $("#walletAddress").val();
        if (web3.utils.isAddress(walletAddress)) {
            web3.eth.getBalance(walletAddress).then(function(balance) {
                const balanceInEther = web3.utils.fromWei(balance, "ether");
                $("#cryptoBalance").html("<strong>SETH Balance: " + balanceInEther + " SETH</strong>");
            });
        } else {
            $("#errorMessage").text("Invalid wallet address");
            $("#errorModal").css("display", "block");
        }
    });

    // Check the ticket token balance for the wallet
    $("#tokenBalanceButton").click(function() {
        const walletAddress = $("#walletAddress").val();
        if (web3.utils.isAddress(walletAddress)) {
            contract.methods.balanceOf(walletAddress).call().then(function(balance) {
                $("#tokenBalance").html("<strong>Ticket Balance: " + balance + " TIX</strong>");
            });

            contract.methods.name().call().then(function(name) {
                $("#tokenName").html("<strong>Token Name: " + name + "</strong>");
            });

            contract.methods.symbol().call().then(function(symbol) {
                $("#tokenSymbol").html("<strong>Token Symbol: " + symbol + "</strong>");
            });

            contract.methods.totalSupply().call().then(function(totalSupply) {
                $("#tokenTotalSupply").html("<strong>Total Tickets Issued: " + totalSupply + "</strong>");
            });

            contract.methods.getAvailableTickets().call().then(function(available) {
                $("#ticketsAvailable").html("<strong>Tickets Available: " + available + "</strong>");
            });

        } else {
            $("#errorMessage").text("Invalid wallet address");
            $("#errorModal").css("display", "block");
        }
    });

    // Close the modal
    $("#closeModal").click(function() {
        $("#errorModal").css("display", "none");
    });

</script>
</html>
