<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Include the Web3 library -->
    <script src="https://cdn.jsdelivr.net/gh/ethereum/web3.js/dist/web3.min.js"></script>
    <!-- Include the jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- Shared config: CONTRACT_ADDRESS, ABI, web3, contract -->
    <script src="../js/config.js"></script>
    <!-- Include your CSS file -->
    <link rel="stylesheet" href="./returnTicket.css">
    <title>Return a Ticket</title>
</head>
<body>
    <p><a href="../index.html">&larr; Home</a></p>

    <h1>Return a Ticket</h1>
    <p>Load your encrypted wallet, then transfer your ticket back to the vendor.</p>

    <!-- Load wallet section -->
    <h3>Step 1: Load Your Wallet</h3>
    <button id="loadWalletButton">Load Wallet</button>
    <input type="password" id="password" placeholder="Enter your wallet password">
    <input type="file" id="keystoreFile" accept=".json">
    <br/>
    <br/>

    <label for="walletAddress">Wallet Address:</label>
    <br/>
    <textarea id="walletAddress" rows="2" cols="70"></textarea>
    <br/>
    <label for="privateKey">Private Key:</label>
    <br/>
    <textarea id="privateKey" rows="2" cols="70"></textarea>
    <br/>
    <br/>

    <!-- Return ticket section -->
    <h3>Step 2: Return Ticket(s)</h3>
    <p>Contract: <span id="contractAddressDisplay"></span></p>
    <input type="number" id="amount" placeholder="Number of tickets" min="1" value="1">
    <button id="returnTicketButton">Return Ticket(s)</button>
    <br/>
    <br/>

    <label for="transactionRequest">Transaction Request:</label>
    <br/>
    <textarea id="transactionRequest" rows="5" cols="70"></textarea>
    <br/>
    <label for="transactionResult">Transaction Result:</label>
    <br/>
    <textarea id="transactionResult" rows="8" cols="70"></textarea>

    <!-- Error/Status Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <p id="errorMessage"></p>
        </div>
    </div>
</body>

<script>
    $("#contractAddressDisplay").html('<a href="https://sepolia.etherscan.io/address/' + CONTRACT_ADDRESS + '" target="_blank">' + CONTRACT_ADDRESS + '</a>');

    // Step 1: Load wallet by decrypting keystore
    $("#loadWalletButton").click(function() {
        if ($("#password").val() == "") {
            $("#errorMessage").text("Please enter a password");
            $("#errorModal").css("display", "block");
            return;
        }

        var file = $("#keystoreFile")[0].files[0];
        if (!file) {
            $("#errorMessage").text("Please select a keystore file");
            $("#errorModal").css("display", "block");
            return;
        }

        var reader = new FileReader();
        reader.onload = function(e) {
            var keystore = e.target.result;
            var password = $("#password").val();
            try {
                var wallet = web3.eth.accounts.decrypt(keystore, password);
                $("#walletAddress").val(wallet.address);
                $("#privateKey").val(wallet.privateKey);
            } catch (error) {
                $("#errorMessage").text(error.message);
                $("#errorModal").css("display", "block");
            }
        };
        reader.readAsText(file);
    });

    // Step 2: Return ticket using the loaded private key
    $("#returnTicketButton").click(function() {
        var privateKey = $("#privateKey").val();
        var amount = parseInt($("#amount").val(), 10);

        if (privateKey == "") {
            $("#errorMessage").text("Please load your wallet first");
            $("#errorModal").css("display", "block");
            return;
        }
        if (!amount || amount < 1) {
            $("#errorMessage").text("Please enter a valid ticket amount");
            $("#errorModal").css("display", "block");
            return;
        }

        var wallet = web3.eth.accounts.privateKeyToAccount(privateKey);

        var transaction = contract.methods.returnTicket(amount);
        var encodedABI = transaction.encodeABI();

        var tx = {
            from: wallet.address,
            to: CONTRACT_ADDRESS,
            gas: 100000,
            chainId: 11155111,
            data: encodedABI
        };

        $("#errorMessage").text("Transaction in progress. This could take 30s.");
        $("#errorModal").css("display", "block");

        web3.eth.accounts.signTransaction(tx, privateKey).then(function(signedTx) {
            web3.eth.sendSignedTransaction(signedTx.rawTransaction).on('receipt', function(receipt) {
                $("#transactionRequest").val(JSON.stringify(tx, null, 2));
                $("#transactionResult").val(JSON.stringify(receipt, null, 2));
                $("#errorMessage").html("Ticket(s) returned! <br/><a href='https://sepolia.etherscan.io/tx/" + receipt.transactionHash + "' target='_blank'>View on Etherscan</a>");
            }).on('error', function(error) {
                $("#errorMessage").text("Transaction failed: " + error.message);
            });
        }).catch(function(error) {
            $("#errorMessage").text("Signing failed: " + error.message);
        });
    });

    // Close the modal
    $("#closeModal").click(function() {
        $("#errorModal").css("display", "none");
    });

</script>
</html>
